<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#17cb11,#fcaa25);
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-section{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    background:#2575fc;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1b5edc;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f4f4f4;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:3px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Todo List</h2>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

const input=document.getElementById("taskInput")
const button=document.getElementById("addBtn")
const list=document.getElementById("taskList")

button.addEventListener("click",function(){

    const task=input.value

    if(task==="") return

    const li=document.createElement("li")

    li.innerHTML=task + " <button class='delete'>X</button>"

    list.appendChild(li)

    input.value=""

})

list.addEventListener("click",function(e){

    if(e.target.className==="delete"){
        e.target.parentElement.remove()
    }

    if(e.target.tagName==="LI"){
        e.target.style.textDecoration="line-through"
    }

})

</script>

</body>
</html>
